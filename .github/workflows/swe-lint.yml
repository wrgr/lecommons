name: SWE Guardrails

on:
  pull_request:
  workflow_dispatch:

jobs:
  swe-lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run SWE linter
        run: python3 scripts/swe_lint.py
